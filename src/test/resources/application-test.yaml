# Test overlay (active together with `dev`, see build.gradle). Only overrides the datasource:
# an isolated in-memory H2 so tests don't touch the file-based dev DB (./data) and don't emit
# "database is already closed" shutdown noise. DB_CLOSE_DELAY=-1 keeps it alive for the JVM.
spring:
    datasource:
        url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
        driver-class-name: org.h2.Driver
        username: sa
        password:
