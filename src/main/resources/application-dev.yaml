spring:
    application:
        name: sportshub-backend
    datasource:
        url: jdbc:h2:file:./data/testdb;AUTO_SERVER=TRUE
        driver-class-name: org.h2.Driver
        username: sa
        password:
    jpa:
        hibernate:
            ddl-auto: create-drop
        defer-datasource-initialization: true
    sql:
        init:
            mode: always
            # Seed the access domain (federations, clubs, bootstrap admin) after schema creation.
            data-locations: classpath:seed/access-seed.sql
    servlet:
        multipart:
            max-file-size: 150MB
            max-request-size: 180MB
    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: http://localhost:8084/realms/dtfb
server:
    port: 8082
external-api:
    base-url: http://localhost:3000
logging:
    level:
        org.springframework.web: DEBUG
        org.springframework.web.multipart: DEBUG
        org.springframework.security: DEBUG
