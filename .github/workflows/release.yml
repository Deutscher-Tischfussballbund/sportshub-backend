# Release: on a version tag (v1.2.3), build the image and push it to GHCR
# tagged with the semver (1.2.3) and `latest`. Deploy by pinning that tag in
# docker-compose.yaml (SPORTSHUB_TAG=1.2.3) and running `docker compose pull && up -d`.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/deutscher-tischfussballbund/sportshub-backend
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # GHCR chokes on buildx's default SLSA provenance/attestation manifest for a new
          # package ("error writing layer blob: not_found"). Push a plain image instead.
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
